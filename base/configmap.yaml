# order-postgres/configmap.yaml
# Non-sensitive PostgreSQL configuration for order-service.

apiVersion: v1
kind: ConfigMap
metadata:
  name: order-postgres-config
  namespace: order-postgres
  labels:
    app.kubernetes.io/name: order-postgres
    app.kubernetes.io/component: config
data:
  # PostgreSQL tuning for a microservice workload
  # These are passed as POSTGRES_INITDB_ARGS or mounted as config
  PGDATA: "/var/lib/postgresql/data/pgdata"

  # Connection pool hint for pg_hba.conf
  POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
