apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace khusus untuk database order
namespace: order-postgres

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml

# Label otomatis untuk semua resource di dalam kustomization ini
commonLabels:
  app.kubernetes.io/name: order-postgres
  app.kubernetes.io/managed-by: kustomize
